<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    background: #07000f;
    color: #ffffff;
    font-family: 'Barlow Condensed', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* ── BACKGROUND ── */
  .bg-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(94,23,235,0.18) 0%, transparent 65%);
    z-index: 0;
  }

  /* Subtle grid */
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(140,82,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(140,82,255,0.05) 1px, transparent 1px);
    background-size: 80px 80px;
    z-index: 0;
  }

  /* Horizontal scan lines for texture */
  .bg-scanlines {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    z-index: 1;
  }

  /* Corner accents */
  .corner {
    position: absolute;
    width: 80px;
    height: 80px;
    z-index: 3;
  }

  .corner-tl { top: 48px; left: 48px; border-top: 2px solid rgba(140,82,255,0.5); border-left: 2px solid rgba(140,82,255,0.5); }
  .corner-tr { top: 48px; right: 48px; border-top: 2px solid rgba(140,82,255,0.5); border-right: 2px solid rgba(140,82,255,0.5); }
  .corner-bl { bottom: 48px; left: 48px; border-bottom: 2px solid rgba(140,82,255,0.5); border-left: 2px solid rgba(140,82,255,0.5); }
  .corner-br { bottom: 48px; right: 48px; border-bottom: 2px solid rgba(140,82,255,0.5); border-right: 2px solid rgba(140,82,255,0.5); }

  /* ── LAYOUT ── */
  .container {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 80px;
    text-align: center;
  }

  /* Top brand */
  .brand-tag {
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 80px;
  }

  /* BTN logo mark */
  .logo-mark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 0.15em;
    color: #8c52ff;
    margin-bottom: 24px;
    text-shadow: 0 0 30px rgba(140,82,255,0.5);
  }

  /* Main headline */
  .headline-week {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 0;
  }

  .headline-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 168px;
    letter-spacing: 0.04em;
    color: #ffffff;
    line-height: 0.85;
    margin-bottom: 4px;
    text-shadow: 0 0 60px rgba(140,82,255,0.2);
  }

  .headline-review {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    letter-spacing: 0.18em;
    color: #8c52ff;
    text-transform: uppercase;
    line-height: 1;
    text-shadow: 0 0 30px rgba(140,82,255,0.5);
    margin-bottom: 56px;
  }

  /* Neon rule */
  .neon-rule {
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #8c52ff, transparent);
    box-shadow: 0 0 12px rgba(140,82,255,0.7);
    margin: 0 auto 56px;
  }

  /* Date range */
  .date-range {
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    margin-bottom: 80px;
  }

  /* TEASER STATS */
  .teaser-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
    width: 100%;
    max-width: 800px;
    border: 1px solid rgba(140,82,255,0.2);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 80px;
  }

  .teaser-row {
    display: flex;
    align-items: center;
    padding: 28px 40px;
    border-bottom: 1px solid rgba(140,82,255,0.12);
    gap: 24px;
  }

  .teaser-row:last-child { border-bottom: none; }

  .teaser-icon {
    font-size: 28px;
    width: 44px;
    text-align: center;
    flex-shrink: 0;
  }

  .teaser-content {
    flex: 1;
    text-align: left;
  }

  .teaser-label {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .teaser-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: #ffffff;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .teaser-value em {
    color: #8c52ff;
    font-style: normal;
  }

  /* Swipe prompt */
  .swipe-prompt {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: rgba(255,255,255,0.2);
  }

  .swipe-arrow {
    font-size: 24px;
    animation: bounce 1.8s infinite;
  }

  .swipe-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  @keyframes bounce {
    0%, 100% { transform: translateX(0); }
    50%       { transform: translateX(8px); }
  }

  /* Slide dots */
  .slide-indicator {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 3;
  }

  .slide-dot { height: 5px; border-radius: 3px; }
  .slide-dot.active  { width: 32px; background: #8c52ff; }
  .slide-dot.inactive { width: 16px; background: rgba(255,255,255,0.15); }
</style>
</head>
<body>
  <div class="bg-vignette"></div>
  <div class="bg-grid"></div>
  <div class="bg-scanlines"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="container">
    <div class="brand-tag">ByTheNumbers &nbsp;·&nbsp; PWHL Analytics</div>

    <div class="logo-mark">BTN</div>

    <div class="headline-week">Week in</div>
    <div class="headline-main">REVIEW</div>
    <div class="headline-review">{{ season }}</div>

    <div class="neon-rule"></div>

    <div class="date-range">{{ week_range }}</div>

    <div class="teaser-grid">
      <div class="teaser-row">
        <div class="teaser-icon">🏒</div>
        <div class="teaser-content">
          <div class="teaser-label">Games This Week</div>
          <div class="teaser-value"><em>{{ teaser.games_played }}</em> games played</div>
        </div>
      </div>
      <div class="teaser-row">
        <div class="teaser-icon">🎯</div>
        <div class="teaser-content">
          <div class="teaser-label">Stat of the Week</div>
          <div class="teaser-value">{{ teaser.stat_line | safe }}</div>
        </div>
      </div>
      <div class="teaser-row">
        <div class="teaser-icon">👑</div>
        <div class="teaser-content">
          <div class="teaser-label">Points Leader</div>
          <div class="teaser-value"><em>{{ teaser.leader_name }}</em> &nbsp;{{ teaser.leader_stat }}</div>
        </div>
      </div>
    </div>

    <div class="swipe-prompt">
      <div class="swipe-arrow">→</div>
      <div class="swipe-text">Swipe for the breakdown</div>
    </div>
  </div>

  <div class="slide-indicator">
    <div class="slide-dot active"></div>
    <div class="slide-dot inactive"></div>
    <div class="slide-dot inactive"></div>
    <div class="slide-dot inactive"></div>
  </div>
</body>
</html>
