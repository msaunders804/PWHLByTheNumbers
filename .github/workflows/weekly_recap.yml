name: PWHL Weekly Recap

on:
  schedule:
    - cron: '0 14 * * 1'   # Every Monday 9AM CST (14:00 UTC)
  workflow_dispatch:         # Allow manual trigger from GitHub UI

jobs:
  recap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install sqlalchemy pymysql jinja2 playwright google-api-python-client \
                      google-auth twilio python-dotenv
          playwright install chromium --with-deps

      - name: Run weekly recap
        env:
          PWHL_DATABASE_URL:        ${{ secrets.PWHL_DATABASE_URL }}
          TWILIO_ACCOUNT_SID:       ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:        ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:              ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:                ${{ secrets.TWILIO_TO }}
          GOOGLE_SERVICE_ACCOUNT:   ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID:   ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python run_weekly.py

      - name: Upload slides as workflow artifacts (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recap-slides
          path: output/*.png
          retention-days: 7
