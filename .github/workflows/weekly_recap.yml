name: PWHL Weekly Recap

on:
  schedule:
    - cron: '0 23 * * 0'   # Every Monday 9AM CST (14:00 UTC)
  workflow_dispatch:         # Allow manual trigger from GitHub UI

jobs:
  recap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install sqlalchemy pymysql jinja2 playwright requests \
                      google-api-python-client google-auth
          playwright install chromium --with-deps

      - name: Run weekly recap
        env:
          PYTHONPATH:             src
          PWHL_DATABASE_URL:      ${{ secrets.PWHL_DATABASE_URL }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          python -m pwhl_btn.ingest.update
          python -m pwhl_btn.jobs.run_weekly

      - name: Upload slides as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recap-slides-${{ github.run_id }}
          path: output/*.png
          retention-days: 7
