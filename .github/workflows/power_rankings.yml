name: PWHL Power Rankings

on:
  schedule:
    - cron: '0 14 * * 4'   # Every Thursday 9:00 AM CST (14:00 UTC)
  workflow_dispatch:

jobs:
  rankings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install sqlalchemy pymysql jinja2 playwright requests \
                      google-api-python-client google-auth
          playwright install chromium --with-deps

      - name: Clear output directory
        run: rm -f output/rankings_*.png

      - name: Render and upload power rankings
        env:
          PWHL_DATABASE_URL:      ${{ secrets.PWHL_DATABASE_URL }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python render_power_rankings.py

      - name: Upload as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: power-rankings-${{ github.run_id }}
          path: output/rankings_*.png
          retention-days: 7
