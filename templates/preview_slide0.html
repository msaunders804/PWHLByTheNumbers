<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1920px;
    background: #0a0800;
    color: #ffffff;
    font-family: 'Barlow Condensed', sans-serif;
    overflow: hidden; position: relative;
  }

  /* ── BACKGROUND ── */
  .bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 70% 15%, rgba(245,166,35,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 20% 75%, rgba(140,82,255,0.35) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 80%, rgba(245,166,35,0.15) 0%, transparent 40%),
      linear-gradient(165deg, #110a00 0%, #0a0800 45%, #0d0520 100%);
  }

  .bg-noise {
    position: absolute; inset: 0; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
    background-size: 200px 200px; opacity: 0.5; mix-blend-mode: overlay;
  }

  /* diagonal gold streak */
  .bg-streak {
    position: absolute; z-index: 1;
    top: -200px; right: -100px;
    width: 6px; height: 1400px;
    background: linear-gradient(to bottom, transparent, rgba(245,166,35,0.4), transparent);
    transform: rotate(-25deg);
    filter: blur(2px);
  }
  .bg-streak-2 {
    position: absolute; z-index: 1;
    top: -200px; right: 60px;
    width: 2px; height: 1200px;
    background: linear-gradient(to bottom, transparent, rgba(245,166,35,0.2), transparent);
    transform: rotate(-25deg);
  }

  .slide {
    position: relative; z-index: 10;
    width: 1080px; height: 1920px;
    display: flex; flex-direction: column;
    padding: 80px 80px 72px;
  }

  /* ── HEADER ── */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0;
  }
  .brand {
    font-family: 'Bebas Neue', sans-serif; font-size: 30px;
    letter-spacing: 5px; color: rgba(255,255,255,0.4);
  }
  .preview-badge {
    display: flex; align-items: center; gap: 10px;
    background: rgba(245,166,35,0.12);
    border: 1px solid rgba(245,166,35,0.4);
    border-radius: 100px; padding: 10px 28px;
  }
  .badge-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #f5a623;
    box-shadow: 0 0 8px rgba(245,166,35,0.8);
  }
  .badge-text {
    font-size: 20px; font-weight: 700; letter-spacing: 4px;
    color: #f5a623; text-transform: uppercase;
  }

  /* ── HERO ── */
  .hero { flex: 1; display: flex; flex-direction: column; justify-content: center; }

  .week-label {
    font-size: 24px; font-weight: 700; letter-spacing: 6px;
    color: rgba(245,166,35,0.7); text-transform: uppercase;
    margin-bottom: 20px;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 200px; line-height: 0.85;
    color: #ffffff;
    margin-bottom: 8px;
  }

  .hero-title span {
    color: #f5a623;
    display: block;
  }

  .week-range {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px; letter-spacing: 4px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 64px;
  }

  /* gold divider */
  .gold-divider {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 64px;
  }
  .gold-divider-line {
    flex: 1; height: 1px;
    background: linear-gradient(to right, rgba(245,166,35,0.6), transparent);
  }
  .gold-divider-diamond {
    width: 8px; height: 8px;
    background: #f5a623;
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* ── TEASER STATS ── */
  .teaser-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 24px; margin-bottom: 0;
  }

  .teaser-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(245,166,35,0.15);
    border-radius: 20px; padding: 32px 24px;
    display: flex; flex-direction: column; gap: 8px;
    position: relative; overflow: hidden;
  }
  .teaser-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(to right, #f5a623, rgba(245,166,35,0.2), transparent);
  }
  .teaser-label {
    font-size: 18px; font-weight: 700; letter-spacing: 3px;
    color: rgba(255,255,255,0.45); text-transform: uppercase;
  }
  .teaser-value {
    font-family: 'Bebas Neue', sans-serif; font-size: 72px;
    line-height: 1; color: #f5a623;
  }
  .teaser-sub {
    font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }

  /* ── FOOTER ── */
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 32px;
    border-top: 1px solid rgba(245,166,35,0.15);
    margin-top: 48px;
  }
  .footer-brand {
    font-family: 'Bebas Neue', sans-serif; font-size: 26px;
    letter-spacing: 4px; color: rgba(255,255,255,0.2);
  }
  .pwhl-logo { height: 34px; opacity: 0.3; }
  .footer-season {
    font-size: 19px; font-weight: 600; letter-spacing: 2px;
    color: rgba(255,255,255,0.2); text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-noise"></div>
<div class="bg-streak"></div>
<div class="bg-streak-2"></div>

<div class="slide">
  <div class="header">
    <div class="brand">BTN</div>
    <div class="preview-badge">
      <div class="badge-dot"></div>
      <div class="badge-text">Week Ahead</div>
    </div>
  </div>

  <div class="hero">
    <div class="week-label">{{ week_label }}</div>
    <div class="hero-title">THE<span>WEEK</span></div>
    <div class="hero-title" style="font-size:140px; color: rgba(255,255,255,0.15); margin-top: -20px;">AHEAD</div>
    <div class="week-range">{{ week_range }}</div>

    <div class="gold-divider">
      <div class="gold-divider-line"></div>
      <div class="gold-divider-diamond"></div>
      <div class="gold-divider-line" style="background: linear-gradient(to left, rgba(245,166,35,0.6), transparent);"></div>
    </div>

    <div class="teaser-grid">
      <div class="teaser-card">
        <div class="teaser-label">Games</div>
        <div class="teaser-value">{{ games_count }}</div>
        <div class="teaser-sub">This week</div>
      </div>
      <div class="teaser-card">
        <div class="teaser-label">Teams</div>
        <div class="teaser-value">{{ teams_count }}</div>
        <div class="teaser-sub">In action</div>
      </div>
      <div class="teaser-card">
        <div class="teaser-label">Must See</div>
        <div class="teaser-value" style="font-size:44px; line-height:1.1;">{{ game_to_watch_short }}</div>
        <div class="teaser-sub">Game to watch</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-brand">BY THE NUMBERS</div>
    {% if pwhl_logo %}<img class="pwhl-logo" src="{{ pwhl_logo }}" alt="PWHL">{% endif %}
    <div class="footer-season">Season 8</div>
  </div>
</div>
</body>
</html>
