<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1920px; background:#07000f; color:#fff;
         font-family:'Barlow Condensed',sans-serif; overflow:hidden; position:relative; }

  .top-bar { position:absolute; top:0; left:0; right:0; height:6px; z-index:30;
             background:linear-gradient(to right,#f5a623,#fbbf24,#f5a623); }

  .bg-glow-top { position:absolute; top:0; left:50%; transform:translateX(-50%);
                 width:1080px; height:700px;
                 background:radial-gradient(ellipse at 50% 0%, rgba(245,166,35,0.13) 0%, transparent 65%);
                 z-index:0; }
  .bg-scanlines { position:absolute; inset:0; z-index:1; pointer-events:none;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px); }

  .corner { position:absolute; width:64px; height:64px; z-index:20; }
  .corner-tl { top:44px; left:44px; border-top:2px solid rgba(245,166,35,0.45); border-left:2px solid rgba(245,166,35,0.45); }
  .corner-tr { top:44px; right:44px; border-top:2px solid rgba(245,166,35,0.45); border-right:2px solid rgba(245,166,35,0.45); }
  .corner-bl { bottom:44px; left:44px; border-bottom:2px solid rgba(245,166,35,0.22); border-left:2px solid rgba(245,166,35,0.22); }
  .corner-br { bottom:44px; right:44px; border-bottom:2px solid rgba(245,166,35,0.22); border-right:2px solid rgba(245,166,35,0.22); }

  .brand { position:absolute; top:36px; left:80px; font-family:'Bebas Neue',sans-serif;
           font-size:26px; letter-spacing:6px; color:rgba(255,255,255,0.22); z-index:25; }
  .stamp { position:absolute; top:32px; right:80px; z-index:25;
           display:flex; align-items:center; gap:10px;
           background:rgba(245,166,35,0.08); border:1.5px solid rgba(245,166,35,0.40);
           border-radius:100px; padding:9px 22px; }
  .stamp-dot  { width:7px; height:7px; border-radius:50%; background:#f5a623; }
  .stamp-text { font-size:13px; font-weight:800; letter-spacing:4px; color:#f5a623; text-transform:uppercase; }

  /* ── Hero ── */
  .hero { position:relative; z-index:5; padding:140px 80px 0; }
  .hero-eyebrow { font-size:16px; font-weight:800; letter-spacing:8px;
                  color:rgba(255,255,255,0.25); text-transform:uppercase; margin-bottom:16px; }
  .hero-title { font-family:'Bebas Neue',sans-serif; font-size:120px; line-height:0.88;
                letter-spacing:2px; color:#fff; }
  .hero-title .accent { color:#f5a623; }
  .hero-rule { width:100%; height:1px; margin-top:44px;
               background:linear-gradient(90deg,rgba(245,166,35,0.55),rgba(245,166,35,0.15),transparent); }

  /* ── Rankings list ── */
  .rankings { position:relative; z-index:5; padding:36px 80px 0;
              display:flex; flex-direction:column; }

  .rank-row {
    display:flex; align-items:center; gap:28px;
    padding:22px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
    position:relative;
  }
  .rank-row:first-child { border-top:1px solid rgba(255,255,255,0.06); }

  /* gold highlight on #1 */
  .rank-row.first {
    background:rgba(245,166,35,0.05);
    border-radius:10px;
    padding:22px 18px;
    margin:0 -18px;
    border-bottom:none;
    border-top:none;
  }
  .rank-row.first + .rank-row { border-top:1px solid rgba(255,255,255,0.06); }

  /* rank number */
  .rank-num {
    font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px;
    width:44px; flex-shrink:0; text-align:center; line-height:1;
    color:rgba(255,255,255,0.20);
  }
  .rank-row.first .rank-num { color:#f5a623; font-size:28px; }

  /* city name + location */
  .rank-city { flex:1; }
  .rank-name {
    font-family:'Bebas Neue',sans-serif; font-size:60px; line-height:0.90;
    letter-spacing:2px; color:#fff;
  }
  .rank-row.first .rank-name { font-size:74px; color:#fff; }
  .rank-location {
    font-size:16px; font-weight:700; letter-spacing:3px;
    color:rgba(255,255,255,0.25); text-transform:uppercase; margin-top:2px;
  }

  /* score + hook */
  .rank-right { text-align:right; flex-shrink:0; }
  .rank-score {
    font-family:'Bebas Neue',sans-serif; font-size:52px; letter-spacing:2px;
    line-height:1; color:rgba(255,255,255,0.18);
  }
  .rank-row.first .rank-score { color:#f5a623; font-size:64px; }
  .rank-score-label {
    font-size:12px; font-weight:800; letter-spacing:4px;
    color:rgba(255,255,255,0.15); text-transform:uppercase;
  }
  .rank-row.first .rank-score-label { color:rgba(245,166,35,0.50); }

  /* ── Footer ── */
  .footer { position:absolute; bottom:32px; left:0; right:0;
            display:flex; justify-content:space-between; align-items:center;
            padding:0 80px; z-index:25; }
  .footer-brand { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:4px; color:rgba(255,255,255,0.12); }
  .footer-label { font-size:14px; font-weight:600; letter-spacing:3px; color:rgba(255,255,255,0.12); text-transform:uppercase; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="bg-glow-top"></div>
<div class="bg-scanlines"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="brand">BTN</div>
<div class="stamp">
  <div class="stamp-dot"></div>
  <div class="stamp-text">Expansion Analysis</div>
  <div class="stamp-dot"></div>
</div>

<div class="hero">
  <div class="hero-eyebrow">PWHL Expansion · Final Rankings</div>
  <div class="hero-title">THE<br><span class="accent">RANKINGS</span></div>
  <div class="hero-rule"></div>
</div>

<div class="rankings">
  {% for city in cities %}
  <div class="rank-row {% if loop.index == 1 %}first{% endif %}">
    <div class="rank-num">#{{ city.rank }}</div>
    <div class="rank-city">
      <div class="rank-name">{{ city.city }}</div>
      <div class="rank-location">{{ city.state_province }} · {{ city.country }}</div>
    </div>
    <div class="rank-right">
      <div class="rank-score">{{ city.composite }}</div>
      <div class="rank-score-label">Score</div>
    </div>
  </div>
  {% endfor %}
</div>

<div class="footer">
  <div class="footer-brand">BY THE NUMBERS</div>
  <div class="footer-label">PWHL Expansion Series</div>
</div>
</body>
</html>
