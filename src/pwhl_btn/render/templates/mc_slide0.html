<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --purple:#5e17eb; --accent:#8c52ff; --gold:#f5a623; }
  body { width:1080px; height:1920px; background:#080812; color:#fff; font-family:'Barlow Condensed',sans-serif; overflow:hidden; position:relative; }

  .top-bar { position:absolute; top:0; left:0; right:0; height:8px; z-index:5; background:linear-gradient(to right,#5e17eb,#8c52ff,#c49fff); }

  /* Hero image */
  .hero-wrap { position:absolute; top:0; left:0; right:0; height:1120px; z-index:1; overflow:hidden; }
  .hero-img { width:100%; height:100%; object-fit:cover; object-position:center 20%; }
  .hero-grad { position:absolute; inset:0; background:linear-gradient(to bottom, rgba(8,8,18,0.45) 0%, rgba(8,8,18,0.05) 25%, rgba(8,8,18,0.55) 65%, rgba(8,8,18,1) 100%); }
  .hero-grad-top { position:absolute; top:0; left:0; right:0; height:180px; background:linear-gradient(to bottom,rgba(8,8,18,0.75),transparent); }

  /* Purple glow fallback (no image) */
  .hero-fallback { position:absolute; inset:0; background:radial-gradient(ellipse at 50% 35%,rgba(140,82,255,0.30) 0%,rgba(94,23,235,0.10) 50%,transparent 80%); }

  /* Brand */
  .brand { position:absolute; top:40px; left:80px; font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:6px; color:rgba(255,255,255,0.35); z-index:10; }
  .badge { position:absolute; top:32px; right:80px; display:flex; align-items:center; gap:10px; background:rgba(140,82,255,0.18); border:1.5px solid rgba(140,82,255,0.55); border-radius:100px; padding:10px 28px; z-index:10; }
  .badge-dot { width:8px; height:8px; border-radius:50%; background:#8c52ff; }
  .badge-text { font-size:20px; font-weight:700; letter-spacing:4px; color:#c49fff; text-transform:uppercase; }

  /* Content — sits in lower portion of slide */
  .content { position:absolute; left:0; right:0; bottom:0; z-index:10; padding:0 80px 140px; display:flex; flex-direction:column; align-items:flex-start; }

  .eyebrow { font-weight:700; font-size:24px; letter-spacing:8px; color:rgba(255,255,255,0.38); text-transform:uppercase; margin-bottom:10px; }
  .road-to { font-family:'Bebas Neue',sans-serif; font-size:68px; line-height:1; color:rgba(255,255,255,0.65); letter-spacing:3px; margin-bottom:2px; }
  .title-walter { font-family:'Bebas Neue',sans-serif; font-size:210px; line-height:0.84; color:#fff; letter-spacing:2px; display:block; }
  .title-cup    { font-family:'Bebas Neue',sans-serif; font-size:210px; line-height:0.84; color:#8c52ff; letter-spacing:2px; display:block; margin-bottom:36px; }

  .divider { width:100px; height:4px; background:linear-gradient(90deg,#8c52ff,rgba(140,82,255,0)); border-radius:2px; margin-bottom:36px; }

  .tagline { font-size:34px; font-weight:700; color:rgba(255,255,255,0.65); line-height:1.3; margin-bottom:40px; max-width:820px; }
  .tagline em { color:#f5a623; font-style:normal; }

  .cta { display:inline-flex; align-items:center; gap:14px; background:linear-gradient(135deg,#5e17eb,#8c52ff); border-radius:100px; padding:18px 40px; font-size:22px; font-weight:800; letter-spacing:4px; color:#fff; text-transform:uppercase; }

  /* Slide dots */
  .dots { position:absolute; bottom:72px; left:0; right:0; display:flex; justify-content:center; gap:14px; z-index:10; }
  .dot { width:10px; height:10px; border-radius:50%; }
  .dot-active   { background:#8c52ff; }
  .dot-inactive { background:rgba(255,255,255,0.2); }

  /* Footer */
  .footer-brand { position:absolute; bottom:40px; left:80px; font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:4px; color:rgba(255,255,255,0.12); z-index:10; }
  .pwhl-logo-wrap { position:absolute; bottom:36px; right:80px; z-index:10; }
  .pwhl-logo { height:34px; opacity:0.18; filter:invert(1); }
</style>
</head>
<body>
<div class="top-bar"></div>

{% if walter_cup_img %}
<div class="hero-wrap">
  <img class="hero-img" src="{{ walter_cup_img }}" alt="Walter Cup">
  <div class="hero-grad"></div>
  <div class="hero-grad-top"></div>
</div>
{% else %}
<div class="hero-wrap"><div class="hero-fallback"></div></div>
{% endif %}

<div class="brand">BTN</div>
<div class="badge"><div class="badge-dot"></div><div class="badge-text">Season {{ season }}</div></div>

<div class="content">
  <div class="eyebrow">PWHL · {{ sim_label }}</div>
  <div class="road-to">THE ROAD TO THE</div>
  <span class="title-walter">WALTER</span>
  <span class="title-cup">CUP</span>
  <div class="divider"></div>
  <div class="tagline">We simulated the rest of the season <em>25,000 times</em> to find out who lifts it.</div>
  <div class="cta">SWIPE FOR PREDICTIONS &nbsp;→</div>
</div>

<div class="dots">
  <div class="dot dot-active"></div>
  <div class="dot dot-inactive"></div>
  <div class="dot dot-inactive"></div>
  <div class="dot dot-inactive"></div>
  <div class="dot dot-inactive"></div>
</div>

<div class="footer-brand">BY THE NUMBERS</div>
{% if pwhl_logo %}<div class="pwhl-logo-wrap"><img class="pwhl-logo" src="{{ pwhl_logo }}" alt="PWHL"></div>{% endif %}
</body>
</html>
