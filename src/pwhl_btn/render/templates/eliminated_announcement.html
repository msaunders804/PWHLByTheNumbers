<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1920px; background:#07000f; color:#fff; font-family:'Barlow Condensed',sans-serif; overflow:hidden; position:relative; }

  /* Background layers */
  .bg-glow-center { position:absolute; top:42%; left:50%; transform:translate(-50%,-50%); width:900px; height:900px; border-radius:50%; background:radial-gradient(circle,rgba(30,30,40,0.60) 0%,transparent 65%); z-index:0; }
  .bg-glow-gold   { position:absolute; bottom:280px; left:50%; transform:translateX(-50%); width:800px; height:400px; background:radial-gradient(ellipse,rgba(245,166,35,0.12) 0%,transparent 65%); z-index:0; }
  .bg-scanlines   { position:absolute; inset:0; background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px); z-index:1; }

  /* Top accent bar — muted gray instead of purple/gold to signal elimination */
  .top-bar { position:absolute; top:0; left:0; right:0; height:8px; z-index:5; background:linear-gradient(to right,#3a3a4a,#6b6b7a,#9ca3af); }

  .corner { position:absolute; width:72px; height:72px; z-index:3; }
  .corner-tl { top:44px; left:44px; border-top:2px solid rgba(156,163,175,0.35); border-left:2px solid rgba(156,163,175,0.35); }
  .corner-tr { top:44px; right:44px; border-top:2px solid rgba(156,163,175,0.35); border-right:2px solid rgba(156,163,175,0.35); }
  .corner-bl { bottom:44px; left:44px; border-bottom:2px solid rgba(245,166,35,0.40); border-left:2px solid rgba(245,166,35,0.40); }
  .corner-br { bottom:44px; right:44px; border-bottom:2px solid rgba(245,166,35,0.40); border-right:2px solid rgba(245,166,35,0.40); }

  .brand  { position:absolute; top:36px; left:80px; font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:6px; color:rgba(255,255,255,0.28); z-index:10; }
  .season { position:absolute; top:40px; right:80px; font-size:18px; font-weight:700; letter-spacing:5px; color:rgba(255,255,255,0.22); text-transform:uppercase; z-index:10; }

  .slide {
    position:relative; z-index:2;
    width:1080px; height:1920px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:0;
  }

  .team-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:58px;
    letter-spacing:6px;
    color:rgba(255,255,255,0.45);
    text-align:center;
    margin-bottom:52px;
  }

  .logo-wrap {
    width:480px; height:480px;
    display:flex; align-items:center; justify-content:center;
    margin-bottom:52px;
    /* desaturated / dimmed to match eliminated state */
    filter:saturate(0.55) brightness(0.75);
  }
  .team-logo {
    width:480px; height:480px;
    object-fit:contain;
    filter:drop-shadow(0 0 40px rgba(100,100,120,0.35));
  }
  .team-logo-placeholder {
    width:480px; height:480px;
    border-radius:24px;
    background:rgba(255,255,255,0.04);
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size:100px; letter-spacing:4px; color:rgba(255,255,255,0.20);
  }

  /* ELIMINATED in silver — not a celebration */
  .elim-word {
    font-family:'Bebas Neue',sans-serif;
    font-size:180px;
    line-height:0.88;
    color:#9ca3af;
    letter-spacing:2px;
    text-align:center;
    text-shadow:0 0 40px rgba(156,163,175,0.30), 0 0 80px rgba(156,163,175,0.12);
    margin-bottom:0;
  }

  .contention-word {
    font-family:'Bebas Neue',sans-serif;
    font-size:52px;
    line-height:1;
    color:rgba(255,255,255,0.30);
    letter-spacing:6px;
    text-align:center;
    margin-bottom:16px;
  }

  .elim-date {
    font-size:22px;
    font-weight:700;
    letter-spacing:5px;
    color:rgba(255,255,255,0.22);
    text-transform:uppercase;
    text-align:center;
    margin-bottom:36px;
  }

  /* Gold divider — signals the pivot to Gold Plan */
  .gold-divider {
    width:200px; height:3px;
    background:linear-gradient(90deg,transparent,#f5a623,transparent);
    border-radius:2px;
    box-shadow:0 0 20px rgba(245,166,35,0.70);
    margin-bottom:36px;
  }

  /* Gold Plan badge — bright, celebratory contrast */
  .gold-plan-badge {
    display:flex; align-items:center; justify-content:center; gap:16px;
    background:rgba(245,166,35,0.12);
    border:2px solid rgba(245,166,35,0.55);
    border-radius:100px;
    padding:18px 52px;
  }
  .gold-plan-badge-dot { width:10px; height:10px; border-radius:50%; background:#f5a623; flex-shrink:0; }
  .gold-plan-badge-text {
    font-family:'Bebas Neue',sans-serif;
    font-size:34px;
    letter-spacing:8px;
    color:#f5a623;
  }

  .footer {
    position:absolute; bottom:52px; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding:0 80px; z-index:10;
  }
  .footer-brand  { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:4px; color:rgba(255,255,255,0.13); }
  .footer-season { font-size:16px; font-weight:600; letter-spacing:3px; color:rgba(255,255,255,0.13); text-transform:uppercase; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="bg-glow-center"></div>
<div class="bg-glow-gold"></div>
<div class="bg-scanlines"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="brand">BTN</div>
<div class="season">PWHL · Season 8</div>

<div class="slide">
  <div class="team-name">{{ team_name }}</div>

  <div class="logo-wrap">
    {% if team_logo %}
      <img class="team-logo" src="{{ team_logo }}" alt="{{ team_name }}">
    {% else %}
      <div class="team-logo-placeholder">{{ team_code }}</div>
    {% endif %}
  </div>

  <div class="elim-word">ELIMINATED</div>
  <div class="contention-word">FROM PLAYOFF CONTENTION</div>
  <div class="elim-date">{{ elimination_date }}</div>

  <div class="gold-divider"></div>

  <div class="gold-plan-badge">
    <div class="gold-plan-badge-dot"></div>
    <div class="gold-plan-badge-text">GOLD PLAN: ACTIVATED</div>
    <div class="gold-plan-badge-dot"></div>
  </div>
</div>

<div class="footer">
  <div class="footer-brand">BY THE NUMBERS</div>
  <div class="footer-season">Season 8 · 2025–26</div>
</div>
</body>
</html>
